server {
    listen 80;

    index index.php index.html index.htm;
    server_name localhost;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    root /var/www/html;

    client_max_body_size 1024M;

    # Raíz: listado de proyectos (como htdocs de XAMPP)
    location = / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Archivos estáticos y directorios — sirve directo si existe
    location / {
        try_files $uri $uri/ @project_fallback;
    }

    # Fallback: redirige al index.php del proyecto (primer segmento de la URL)
    # Ej: /miproyecto/controlador/metodo → /miproyecto/index.php?$args
    location @project_fallback {
        rewrite ^(/[^/?]+) $1/index.php?$args last;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
